<div class="max-w-4xl">
  <div class="mb-6">
    <h1 class="text-3xl font-semibold text-gray-800">Perfil</h1>
    <p class="text-gray-600 mt-1">Administra tu información personal</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-xl shadow-md p-6 text-center">
      <div class="w-24 h-24 bg-gradient-to-br from-[#0077B6] to-[#90E0EF] rounded-full mx-auto mb-4 flex items-center justify-center">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </div>
      <h3 class="text-xl font-semibold text-gray-800">{{profileData.fullName}}</h3>
      <p class="text-sm text-gray-600 mt-1">{{profileData.email}}</p>
      <div class="mt-4 pt-4 border-t border-gray-200">
        <div class="space-y-2">
          <div class="flex justify-between text-sm">
            <span class="text-gray-600">Teléfono:</span>
            <span class="font-medium text-gray-800">{{profileData.phone}}</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-gray-600">DNI:</span>
            <span class="font-medium text-gray-800">{{profileData.dni}}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-2">
      <div class="bg-white rounded-xl shadow-md p-6">
        <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
          <svg class="w-5 h-5 text-[#0077B6]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          Información Personal
        </h3>

        <div *ngIf="savedProfile" class="mb-4 bg-green-50 border-l-4 border-[#2ECC71] p-4 rounded-lg">
          <p class="text-[#2ECC71] text-sm">¡Información actualizada exitosamente!</p>
        </div>

        <form (ngSubmit)="onProfileSubmit()" class="space-y-4">
          <div>
            <label class="block text-sm text-gray-700 mb-2">Nombres y Apellidos</label>
            <input type="text" [(ngModel)]="profileData.fullName" name="fullName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0077B6] focus:border-transparent" required />
          </div>
          <div>
            <label class="block text-sm text-gray-700 mb-2">Correo Electrónico</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              <input type="email" [(ngModel)]="profileData.email" name="email" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0077B6] focus:border-transparent" required />
            </div>
          </div>
          <div>
            <label class="block text-sm text-gray-700 mb-2">Teléfono</label>
            <input type="tel" [(ngModel)]="profileData.phone" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0077B6] focus:border-transparent" required />
          </div>
          <div>
            <label class="block text-sm text-gray-700 mb-2">N° de DNI</label>
            <input type="text" [(ngModel)]="profileData.dni" name="dni" pattern="[0-9]{8}" maxlength="8" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0077B6] focus:border-transparent" required />
          </div>
          <button type="submit" class="w-full bg-[#0077B6] text-white py-3 rounded-lg hover:bg-[#005F8F] transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
            </svg>
            Guardar Cambios
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
