<div class="d-flex justify-content-center align-items-center min-vh-100 bg-white">
  <div style="max-width: 420px; width: 100%; padding: 2rem;">
    <div class="d-flex align-items-center justify-content-center mb-4 gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0077B6"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z">
        </path>
        <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97">
        </path>
      </svg>
      <div>
        <h1 class="h2 fw-bold mb-0 text-primary">AquaPredict</h1>
        <p class="text-muted mb-0 small">Ventanilla</p>
      </div>
    </div>

    <h2 class="h4 text-center fw-bold mb-1">Bienvenido</h2>
    <p class="text-center text-secondary mb-4">Sistema de Predicción de Consumo de Agua</p>

    <form>
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <div class="input-group">
          <span class="input-group-text">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-mail absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5">
              <rect width="20" height="16" x="2" y="4" rx="2"></rect>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
          </span>
          <input type="email" class="form-control" required />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input type="password" class="form-control" required />
        </div>
      </div>

      <div class="mb-4 text-end">
        <a href="#" class="small text-primary">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-semibold">Iniciar Sesión</button>
    </form>
  </div>
</div>
