<div class="min-h-screen flex">
  <!-- Left side - Login form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-white">
    <div class="w-full max-w-md">
      <div class="flex items-center justify-center mb-8">
        <svg class="h-12 w-12 text-[#0077B6] mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
        </svg>
        <div>
          <h1 class="text-3xl font-bold text-[#0077B6]">AquaPredict</h1>
          <p class="text-sm text-gray-600">Ventanilla</p>
        </div>
      </div>

      <h2 class="text-2xl font-semibold text-gray-800 mb-2 text-center">Bienvenido</h2>
      <p class="text-gray-600 mb-8 text-center">Sistema de Predicción de Consumo de Agua</p>

      <form (ngSubmit)="onLogin()" class="space-y-6">
        <div>
          <label class="block text-sm mb-2 text-gray-700">Correo Electrónico</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
            <input
              type="email"
              [(ngModel)]="user.usuario"
              name="username"
              class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0077B6] focus:border-transparent"
              placeholder="correo@ejemplo.com"
              required
            />
          </div>
        </div>

        <div>
          <label class="block text-sm mb-2 text-gray-700">Contraseña</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="user.password"
              name="password"
              class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0077B6] focus:border-transparent"
              placeholder="••••••••"
              required
            />
            <button type="button" (click)="togglePassword()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex justify-end">
          <a routerLink="/app/forgot-password" class="text-sm text-[#0077B6] hover:underline">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <button
          type="submit"
          [disabled]="showLoading"
          class="w-full bg-[#0077B6] text-white py-3 rounded-lg hover:bg-[#005F8F] transition-colors disabled:opacity-70"
        >
          <span *ngIf="showLoading">Iniciando...</span>
          <span *ngIf="!showLoading">Iniciar Sesión</span>
        </button>
      </form>
    </div>
  </div>

  <!-- Right side -->
  <div class="hidden lg:block lg:w-1/2 bg-gradient-to-br from-[#0077B6] via-[#048ABF] to-[#90E0EF] relative overflow-hidden">
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="text-center text-white p-8">
        <svg class="h-32 w-32 mx-auto mb-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
        </svg>
        <h2 class="text-4xl font-bold mb-4">Gestión Inteligente del Agua</h2>
        <p class="text-xl opacity-90">Predicción basada en IA para optimizar el consumo de agua en Ventanilla</p>
      </div>
    </div>
    <div class="absolute top-10 right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 left-20 w-60 h-60 bg-white/10 rounded-full blur-3xl"></div>
  </div>
</div>
